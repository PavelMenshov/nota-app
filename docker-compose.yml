services:
  # PostgreSQL Database
  nota-postgres:
    image: postgres:16-alpine
    container_name: nota-postgres
    environment:
      POSTGRES_USER: nota
      POSTGRES_PASSWORD: nota_dev_password
      POSTGRES_DB: nota
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nota -d nota']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  nota-redis:
    image: redis:7-alpine
    container_name: nota-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible object storage)
  nota-minio:
    image: minio/minio:latest
    container_name: nota-minio
    environment:
      MINIO_ROOT_USER: nota_minio
      MINIO_ROOT_PASSWORD: nota_minio_password
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: nota-network
